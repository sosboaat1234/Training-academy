<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SITEM Academy — ระบบเรียนรู้ผลิตภัณฑ์และอุปกรณ์</title>
<meta name="description" content="SITEM Academy — ระบบเรียนรู้ผลิตภัณฑ์และอุปกรณ์ Data Center สำหรับพนักงาน SITEM" />
<link rel="icon" href="sitem-mark.png" />
<meta property="og:title" content="SITEM Academy" />
<meta property="og:description" content="ระบบเรียนรู้ผลิตภัณฑ์และอุปกรณ์ของ SITEM" />
<meta property="og:image" content="sitem-mark.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<script src="https://accounts.google.com/gsi/client" async defer></script>

<style>
/* ============================================================ 1) DESIGN TOKENS ============================================================ */
:root{
  --blue-50:#e9f5fb; --blue-100:#cae8f6; --blue-200:#98d2ee; --blue-300:#5cb6e3;
  --blue-400:#2598d4; --blue-500:#0e7cc0; --blue-600:#0a66a6; --blue-700:#0a558c;
  --blue-800:#073f6b; --blue-900:#04314f;
  --cyan-300:#80d8ea; --cyan-400:#4bc3d9; --cyan-500:#28aecb; --cyan-600:#1690ad;
  --slate-0:#fff; --slate-25:#fafbfd; --slate-50:#f4f6fa; --slate-100:#e9edf4;
  --slate-200:#d7dde8; --slate-300:#b9c2d2; --slate-400:#8b97ab; --slate-500:#647084;
  --slate-600:#4a5568; --slate-700:#353f50; --slate-800:#232b39; --slate-900:#131923;
  --green-50:#e7f7ee; --green-500:#16a35a; --green-600:#128048;
  --amber-50:#fdf3e2; --amber-500:#e08a16; --amber-600:#b86d0c;
  --red-50:#fdecec;   --red-500:#d83a3a;   --red-600:#b22a2a;
  --color-primary:var(--blue-500); --color-primary-hover:var(--blue-600); --color-primary-active:var(--blue-700);
  --color-primary-soft:var(--blue-50); --color-accent:var(--cyan-500);
  --text-strong:var(--slate-900); --text-body:var(--slate-700); --text-muted:var(--slate-500);
  --text-faint:var(--slate-400); --text-on-dark:#eef3fb;
  --surface-page:var(--slate-50); --surface-card:var(--slate-0); --surface-sunken:var(--slate-100);
  --border-subtle:var(--slate-200); --border-default:var(--slate-300); --border-focus:var(--blue-400);
  --font-sans:"IBM Plex Sans Thai","IBM Plex Sans",-apple-system,"Segoe UI",system-ui,sans-serif;
  --font-mono:"IBM Plex Mono",ui-monospace,Menlo,monospace;
  --radius-sm:6px; --radius-md:10px; --radius-lg:14px; --radius-xl:20px; --radius-pill:999px;
  --shadow-sm:0 1px 3px rgba(19,25,35,.08),0 1px 2px rgba(19,25,35,.04);
  --shadow-md:0 4px 12px rgba(19,25,35,.08),0 2px 4px rgba(19,25,35,.04);
  --shadow-lg:0 12px 28px rgba(19,25,35,.12),0 4px 8px rgba(19,25,35,.05);
  --shadow-brand:0 8px 22px rgba(14,124,192,.30);
  --ring:0 0 0 3px rgba(14,124,192,.30);
  --sidebar-w:248px; --topbar-h:64px; --container-max:1200px;
  --ease-out:cubic-bezier(.22,.61,.36,1); --dur-fast:120ms; --dur-base:200ms; --dur-slow:320ms;
  color-scheme:light;
}
/* ============================================================ 2) BASE ============================================================ */
*,*::before,*::after{box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{margin:0;font-family:var(--font-sans);font-size:16px;line-height:1.55;color:var(--text-body);
  background:var(--surface-page);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
button{font-family:inherit;cursor:pointer;}
.mono{font-family:var(--font-mono);}
.eyebrow{font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--color-primary);}

/* ============================================================ 3) LAYOUT + LOGIN ============================================================ */
.layout{display:none;min-height:100vh;}
.layout.show{display:flex;}
.login{position:fixed;inset:0;z-index:60;display:flex;align-items:center;justify-content:center;padding:20px;
  background-image:linear-gradient(160deg,var(--blue-800),var(--blue-600)),
    linear-gradient(rgba(75,195,217,.12) 1px,transparent 1px),
    linear-gradient(90deg,rgba(75,195,217,.12) 1px,transparent 1px);
  background-size:100% 100%,26px 26px,26px 26px;}
.login.hidden{display:none;}
.login-card{background:#fff;border-radius:var(--radius-xl);box-shadow:var(--shadow-lg);padding:34px 30px;width:100%;max-width:380px;text-align:center;}
.login-card img{width:54px;height:54px;border-radius:12px;background:#fff;padding:5px;box-shadow:var(--shadow-sm);}
.login-brand{font-weight:700;font-size:18px;color:var(--blue-800);margin-top:8px;letter-spacing:.02em;}
.login-brand span{color:var(--cyan-500);letter-spacing:.18em;font-size:12px;}
.login-card h2{margin:14px 0 4px;font-size:20px;color:var(--text-strong);}
.login-card>p{color:var(--text-muted);font-size:14px;margin:0 0 6px;}
.login-card label{display:block;text-align:left;font-size:13px;font-weight:600;color:var(--text-body);margin:12px 0 5px;}
.login-card input{width:100%;border:1px solid var(--border-subtle);background:var(--slate-25);border-radius:var(--radius-md);padding:11px 13px;font-size:15px;font-family:inherit;}
.login-card input:focus{outline:0;border-color:var(--border-focus);box-shadow:var(--ring);background:#fff;}
.login-card .btn{width:100%;margin-top:18px;}
.login-err{color:var(--red-600);font-size:13px;text-align:left;margin:8px 0 0;}
.gsi-wrap{display:none;justify-content:center;margin-top:14px;}
.or{display:none;align-items:center;gap:10px;color:var(--text-faint);font-size:12px;margin:14px 0 0;}
.or::before,.or::after{content:"";flex:1;height:1px;background:var(--border-subtle);}
.logout{margin-left:8px;background:var(--surface-sunken);border:0;color:var(--text-muted);font-size:12px;padding:6px 10px;border-radius:var(--radius-pill);cursor:pointer;}
.logout:hover{background:var(--slate-200);color:var(--text-body);}
.adminbtn{margin-left:4px;background:var(--blue-500);color:#fff;border:0;font-size:12px;font-weight:600;padding:6px 12px;border-radius:var(--radius-pill);text-decoration:none;}
.adminbtn:hover{background:var(--blue-600);}

/* Sidebar */
.sidebar{width:var(--sidebar-w);flex-shrink:0;position:sticky;top:0;height:100vh;color:var(--text-on-dark);
  display:flex;flex-direction:column;padding:20px 14px;
  background-image:linear-gradient(160deg,var(--blue-800),var(--blue-600)),
    linear-gradient(rgba(75,195,217,.12) 1px,transparent 1px),
    linear-gradient(90deg,rgba(75,195,217,.12) 1px,transparent 1px);
  background-size:100% 100%,24px 24px,24px 24px;}
.brand{display:flex;align-items:center;gap:10px;padding:4px 8px 16px;}
.brand img{width:38px;height:38px;border-radius:9px;background:#fff;padding:4px;box-shadow:var(--shadow-sm);}
.brand .name{font-weight:700;font-size:18px;letter-spacing:.02em;line-height:1;color:#fff;}
.brand .sub{font-size:11px;letter-spacing:.18em;color:var(--cyan-300);font-weight:600;}
.nav-label{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.55);font-weight:600;padding:6px 10px;margin-top:8px;}
.nav{display:flex;flex-direction:column;gap:3px;}
.nav.scroll{overflow-y:auto;flex:1;}
.nav-item{display:flex;align-items:center;gap:11px;width:100%;text-align:left;border:0;background:transparent;
  color:rgba(238,243,251,.85);padding:10px 11px;border-radius:var(--radius-md);font-size:14.5px;
  transition:background var(--dur-fast),color var(--dur-fast);}
.nav-item:hover{background:rgba(255,255,255,.08);color:#fff;}
.nav-item.active{background:rgba(255,255,255,.16);color:#fff;font-weight:600;box-shadow:var(--shadow-sm);}
.nav-item svg{width:19px;height:19px;flex-shrink:0;}
.nav-item .ni-text{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ni-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.3);flex-shrink:0;}
.ni-dot.done{background:var(--green-500);box-shadow:0 0 0 3px rgba(22,163,90,.25);}
.side-progress{margin-top:12px;background:rgba(255,255,255,.08);border-radius:var(--radius-lg);padding:14px;display:flex;align-items:center;gap:12px;backdrop-filter:blur(4px);}
.side-progress .ring{width:52px;height:52px;flex-shrink:0;}
.side-progress .txt b{display:block;font-size:11px;letter-spacing:.04em;color:#fff;font-weight:600;}
.side-progress .txt span{font-size:11px;color:var(--cyan-300);}

/* ขวา */
.main{flex:1;min-width:0;display:flex;flex-direction:column;}
.topbar{height:var(--topbar-h);position:sticky;top:0;z-index:30;background:rgba(255,255,255,.92);backdrop-filter:blur(8px);
  border-bottom:1px solid var(--border-subtle);display:flex;align-items:center;gap:16px;padding:0 22px;}
.topbar .page-title b{display:block;font-size:16px;color:var(--text-strong);font-weight:700;line-height:1.2;}
.topbar .page-title span{font-size:12px;color:var(--text-muted);}
.search{flex:1;max-width:420px;margin-left:auto;position:relative;}
.search input{width:100%;border:1px solid var(--border-subtle);background:var(--slate-25);border-radius:var(--radius-md);padding:9px 12px 9px 38px;font-size:14px;color:var(--text-body);transition:border var(--dur-fast),box-shadow var(--dur-fast);}
.search input:focus{outline:0;border-color:var(--border-focus);box-shadow:var(--ring);background:#fff;}
.search svg{width:18px;height:18px;color:var(--text-faint);position:absolute;left:12px;top:50%;transform:translateY(-50%);}
.bell{position:relative;color:var(--text-muted);background:transparent;border:0;padding:6px;border-radius:50%;}
.bell:hover{background:var(--surface-sunken);}
.bell svg{width:20px;height:20px;}
.bell .dot{position:absolute;top:6px;right:6px;width:7px;height:7px;border-radius:50%;background:var(--red-500);border:1.5px solid #fff;}
.who{display:flex;align-items:center;gap:9px;}
.avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--blue-500),var(--cyan-500));color:#fff;font-weight:600;font-size:13px;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.avatar img{width:100%;height:100%;object-fit:cover;}
.who b{display:block;font-size:13px;color:var(--text-strong);line-height:1.2;}
.who span{font-size:11.5px;color:var(--text-muted);}
.content{padding:24px 28px 48px;max-width:var(--container-max);width:100%;margin:0 auto;}

/* ============================================================ 4) CARDS & COMPONENTS ============================================================ */
.card{background:var(--surface-card);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);box-shadow:var(--shadow-sm);padding:24px;}
.stack>*+*{margin-top:20px;}
.fade-in{animation:fadeIn var(--dur-base) var(--ease-out);}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
.welcome{background:linear-gradient(135deg,var(--blue-700),var(--blue-500));color:#fff;border-radius:var(--radius-lg);padding:20px 24px;box-shadow:var(--shadow-brand);display:flex;align-items:center;gap:16px;}
.welcome .wv{font-size:30px;}
.welcome b{font-size:18px;font-weight:700;display:block;}
.welcome span{font-size:13px;color:var(--cyan-300);}
.product-head{display:flex;gap:18px;align-items:flex-start;}
.product-icon{width:56px;height:56px;border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0;box-shadow:var(--shadow-sm);}
.product-icon svg{width:28px;height:28px;}
.product-head h2{margin:2px 0;font-size:26px;font-weight:700;color:var(--text-strong);letter-spacing:-.01em;line-height:1.15;}
.product-head .tagline{color:var(--text-muted);font-size:15px;}
.desc{color:var(--text-body);margin-top:16px;line-height:1.7;}
.howto{list-style:none;padding:0;margin:18px 0 0;display:flex;flex-direction:column;gap:12px;}
.howto li{display:flex;gap:12px;align-items:flex-start;}
.howto .num{flex-shrink:0;width:26px;height:26px;border-radius:50%;background:var(--color-primary-soft);color:var(--color-primary);font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:center;}
.howto span.t{font-size:15px;color:var(--text-body);line-height:1.5;}
.section-title{display:flex;align-items:center;gap:9px;font-size:18px;font-weight:600;color:var(--text-strong);margin:0 0 16px;}
.section-title svg{width:20px;height:20px;color:var(--color-accent);}
.video-wrap{position:relative;width:100%;padding-top:56.25%;border-radius:var(--radius-md);overflow:hidden;background:#000;box-shadow:var(--shadow-md);}
.video-wrap iframe{position:absolute;inset:0;width:100%;height:100%;border:0;}
.video-meta{display:flex;align-items:center;gap:10px;margin-top:12px;font-size:13px;color:var(--text-muted);}
.video-meta .pill{font-family:var(--font-mono);background:var(--surface-sunken);color:var(--text-body);padding:3px 9px;border-radius:var(--radius-pill);font-size:12px;}
.doc-list{display:flex;flex-direction:column;gap:8px;}
.doc-item{display:flex;align-items:center;gap:11px;border:1px solid var(--border-subtle);border-radius:var(--radius-md);padding:12px 14px;text-decoration:none;color:var(--text-body);transition:border var(--dur-fast),background var(--dur-fast);}
.doc-item:hover{border-color:var(--border-focus);background:var(--color-primary-soft);}
.doc-item .di-ic{color:var(--color-accent);display:flex;}
.doc-item .di-ic svg{width:20px;height:20px;}
.doc-item span{flex:1;font-size:14.5px;}
.doc-item .di-go{color:var(--text-faint);display:flex;}
.doc-item .di-go svg{width:16px;height:16px;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:0;font-weight:600;font-size:15px;padding:11px 22px;border-radius:var(--radius-md);text-decoration:none;transition:background var(--dur-fast),box-shadow var(--dur-fast),transform var(--dur-fast);}
.btn svg{width:18px;height:18px;}
.btn-primary{background:var(--color-primary);color:#fff;box-shadow:var(--shadow-brand);}
.btn-primary:hover{background:var(--color-primary-hover);}
.btn-primary:active{background:var(--color-primary-active);transform:translateY(1px);}
.btn-ghost{background:var(--surface-sunken);color:var(--text-body);}
.btn-ghost:hover{background:var(--slate-200);}
.btn-done{background:var(--green-50);color:var(--green-600);}
.btn-done:hover{background:#d6f0e0;}
.quiz-actions{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-top:6px;}
.quiz-nolink{color:var(--text-faint);font-size:14px;}
a:focus-visible,button:focus-visible,input:focus-visible{outline:2px solid var(--blue-400);outline-offset:2px;}
.ni-soon{font-size:9px;background:rgba(255,255,255,.16);color:rgba(255,255,255,.75);padding:2px 6px;border-radius:99px;flex-shrink:0;white-space:nowrap;}
.soon-box{background:var(--slate-50);border:1px dashed var(--border-default);border-radius:var(--radius-md);padding:42px 20px;text-align:center;color:var(--text-muted);font-size:14px;}
.demo-frame{width:100%;height:72vh;border:1px solid var(--border-subtle);border-radius:var(--radius-md);display:block;background:#10151c;}
.lib-frame{width:100%;height:76vh;border:0;display:block;}

/* ============================================================ 5) RESPONSIVE ============================================================ */
@media(max-width:880px){
  .hamb{display:inline-flex;}
  .sidebar{position:fixed;top:0;left:0;width:248px;height:100vh;z-index:55;transform:translateX(-100%);transition:transform var(--dur-base);box-shadow:var(--shadow-lg);}
  .sidebar.open{transform:translateX(0);}
  .scrim.show{display:block;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:54;}
  .topbar{padding:0 14px;gap:10px;}
  .page-title{display:none;}
  .search{max-width:none;}
  .who b,.who span{display:none;}
  .content{padding:18px 14px 40px;}
  .product-head h2{font-size:22px;}
  .login-card{max-width:100%;}
  .dash-hero{padding:20px;}
  .dash-hero .ring2{width:80px;height:80px;margin-left:0;}
}
/* เมนูจัดกลุ่มหมวด */
.nav-group{display:flex;align-items:center;justify-content:space-between;width:100%;background:transparent;border:0;cursor:pointer;font-family:inherit;font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--cyan-300);font-weight:700;padding:12px 10px 4px;}
.nav-group:first-child{padding-top:2px;}
.nav-group:hover{color:#fff;}
.nav-group .caret{width:13px;height:13px;color:rgba(255,255,255,.55);transition:transform var(--dur-fast);flex-shrink:0;}
.nav-group.collapsed .caret{transform:rotate(-90deg);}
.lesson-nav{display:flex;justify-content:space-between;gap:12px;margin-top:4px;}
.lesson-nav .btn{flex:0 1 auto;max-width:49%;}
.lesson-nav .btn span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.lesson-nav>span{flex:1;}
/* แดชบอร์ดหน้าแรก */
.dash-hero{background:linear-gradient(135deg,var(--blue-800),var(--blue-500));color:#fff;border-radius:var(--radius-lg);padding:26px 28px;box-shadow:var(--shadow-brand);display:flex;align-items:center;gap:24px;flex-wrap:wrap;}
.dash-hero .ring2{width:96px;height:96px;flex-shrink:0;margin-left:auto;}
.dash-hero .hi{flex:1;min-width:220px;}
.dash-hero h2{margin:4px 0 6px;font-size:26px;font-weight:700;}
.dash-hero p{margin:0 0 14px;color:#dbe9f7;font-size:14px;}
.dash-hero .eyebrow{color:var(--cyan-300);}
.dash-hero .btn{background:#fff;color:var(--blue-700);}
.dash-hero .btn:hover{background:#eaf3fb;}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;}
.stat{background:#fff;border:1px solid var(--border-subtle);border-radius:var(--radius-lg);box-shadow:var(--shadow-sm);padding:16px 18px;display:flex;align-items:center;gap:14px;}
.stat .si{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0;}
.stat .si svg{width:22px;height:22px;}
.stat b{display:block;font-size:24px;font-weight:700;color:var(--text-strong);font-family:var(--font-mono);line-height:1.1;}
.stat span{font-size:12.5px;color:var(--text-muted);}
.cat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:14px;}
.cat-card{background:#fff;border:1px solid var(--border-subtle);border-radius:var(--radius-lg);box-shadow:var(--shadow-sm);padding:18px;cursor:pointer;transition:transform var(--dur-base),box-shadow var(--dur-base);text-align:left;width:100%;font-family:inherit;}
.cat-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md);}
.cat-card .ch{display:flex;align-items:center;gap:12px;}
.cat-card .ci{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0;}
.cat-card .ci svg{width:21px;height:21px;}
.cat-card b{font-size:15px;color:var(--text-strong);}
.cat-card .cmeta{font-size:12.5px;color:var(--text-muted);}
.cat-bar{height:6px;border-radius:99px;background:var(--slate-100);overflow:hidden;margin-top:12px;}
.cat-bar i{display:block;height:100%;background:var(--cyan-500);border-radius:99px;transition:width var(--dur-slow);}
/* ปุ่มเมนูมือถือ */
.hamb{display:none;background:transparent;border:0;color:var(--text-strong);padding:6px;border-radius:8px;}
.hamb svg{width:24px;height:24px;}
.scrim{display:none;}
.empty{color:var(--text-faint);font-size:14px;padding:18px;text-align:center;}
</style>
</head>

<body>

<!-- ===== LOGIN ===== -->
<div class="login" id="loginScreen">
  <div class="login-card">
    <img src="sitem-mark.png" alt="SITEM" />
    <div class="login-brand">SITEM <span>ACADEMY</span></div>
    <h2>เข้าสู่ระบบเรียนรู้</h2>
    <p>ใช้บัญชีบริษัท (@sitem.co.th) เพื่อเข้าใช้งาน</p>
    <form id="loginForm">
      <label for="loginName">ชื่อ-สกุล</label>
      <input id="loginName" type="text" placeholder="เช่น ธนกฤต พงษ์ไทย" required />
      <label for="loginEmail">อีเมลบริษัท</label>
      <input id="loginEmail" type="email" placeholder="yourname@sitem.co.th" required />
      <p class="login-err" id="loginErr"></p>

function videoEmbed(p){
  const v = (p.videoId || p.video || "").trim();
  if(v.includes("drive.google.com")){
    const m = v.match(/\/d\/([^/]+)/) || v.match(/[?&]id=([^&]+)/);
    if(m) return "https://drive.google.com/file/d/"+m[1]+"/preview";
  }
  const yt = v.match(/(?:youtu\.be\/|v=|embed\/)([A-Za-z0-9_-]{6,})/);
  const id = yt ? yt[1] : v;
  return "https://www.youtube.com/embed/"+id;
}

/* ----- จำความคืบหน้ารายคน (เก็บใน localStorage ผูกกับอีเมล) ----- */
function progKey(){ return currentUser ? "sitem_progress_"+currentUser.email.toLowerCase() : null; }
function loadProgress(){
  for(const k in passed) delete passed[k];
  const key=progKey(); if(!key) return;
  try{ const s=JSON.parse(localStorage.getItem(key)); if(s) Object.assign(passed,s); }catch(e){}
}
function saveProgress(){ const key=progKey(); if(key) localStorage.setItem(key, JSON.stringify(passed)); }

/* ============================================================ 4) progress ring รวม ============================================================ */
function renderOverall(){
  const total = PRODUCTS.length;
  const done = Object.values(passed).filter(Boolean).length;
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById("overallText").textContent = `${done} / ${total} หลักสูตร`;
  document.getElementById("overallRing").innerHTML = `
    <path d="M18 2.1a15.9 15.9 0 110 31.8 15.9 15.9 0 010-31.8" fill="none" stroke="rgba(255,255,255,.18)" stroke-width="3.6"/>
    <path d="M18 2.1a15.9 15.9 0 110 31.8 15.9 15.9 0 010-31.8" fill="none" stroke="var(--cyan-400)" stroke-width="3.6" stroke-linecap="round" stroke-dasharray="${pct},100"/>
    <text x="18" y="21" text-anchor="middle" font-size="9" font-weight="700" fill="#fff" font-family="var(--font-mono)">${pct}%</text>`;
}

/* ============================================================ 5) เมนู sidebar ============================================================ */
const navCollapsed = JSON.parse(localStorage.getItem("sitem_navcollapsed")||"{}");
function toggleCat(c){ navCollapsed[c]=!navCollapsed[c]; localStorage.setItem("sitem_navcollapsed",JSON.stringify(navCollapsed)); renderNav(document.getElementById("searchInput").value); }
function renderNav(keyword=""){
  const nav = document.getElementById("productNav");
  const k = keyword.trim().toLowerCase();
  const list = PRODUCTS.filter(p=>p.name.toLowerCase().includes(k)||p.tagline.toLowerCase().includes(k));
  document.getElementById("noResult").style.display = list.length ? "none" : "block";
  document.getElementById("homeBtn").classList.toggle("active", inHome);
  document.getElementById("libBtn").classList.toggle("active", inLibrary);
  nav.innerHTML = "";
  CAT_ORDER.forEach(([cat,label])=>{
    const items = list.filter(p=>p.eyebrow===cat);
    if(!items.length) return;
    const collapsed = !k && !!navCollapsed[cat];   // ค้นหาอยู่ = กางทุกหมวด
    const h=document.createElement("button");
    h.className="nav-group"+(collapsed?" collapsed":"");
    h.innerHTML=`<span>${label}</span><svg class="caret" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>`;
    h.onclick=()=>toggleCat(cat);
    nav.appendChild(h);
    if(collapsed) return;
    items.forEach(p=>{
      const btn=document.createElement("button");
      btn.className="nav-item"+((!inHome && !inLibrary && p.id===currentId)?" active":"");
      const tag = passed[p.id] ? '<span class="ni-dot done" title="เรียนจบแล้ว"></span>'
        : (!isReady(p) ? '<span class="ni-soon">เร็วๆนี้</span>' : '<span class="ni-dot"></span>');
      btn.innerHTML=`${svg(p.icon)}<span class="ni-text">${p.name}</span>${tag}`;
      btn.onclick=()=>selectProduct(p.id);
      nav.appendChild(btn);
    });
  });
}

/* ============================================================ 6) เลือกผลิตภัณฑ์ / เปิดคลังเอกสาร ============================================================ */
function selectProduct(id){
  inLibrary = false; inHome = false; closeMenu();
  currentId = id;
  renderNav(document.getElementById("searchInput").value);
  renderContent();
  document.querySelector(".content").scrollIntoView({behavior:"smooth",block:"start"});
}
function showLibrary(){
  inLibrary = true; inHome = false; closeMenu();
  renderNav(document.getElementById("searchInput").value);
  document.getElementById("contentArea").innerHTML = `
    <div class="card fade-in" style="padding:0;overflow:hidden">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 18px;border-bottom:1px solid var(--border-subtle)">
        <h3 class="section-title" style="margin:0">${svg("doc")} คลังเอกสาร</h3>
        <a class="btn btn-ghost" href="${LIBRARY_URL}" target="_blank" rel="noopener" style="padding:7px 14px;font-size:13px">${svg("arrow")} เปิดในแท็บใหม่</a>
      </div>
      <iframe class="lib-frame" src="${LIBRARY_URL}" title="คลังเอกสาร"></iframe>
    </div>`;
  document.querySelector(".content").scrollIntoView({behavior:"smooth",block:"start"});
}
document.getElementById("libBtn").onclick = showLibrary;
document.getElementById("homeBtn").onclick = showHome;
function closeMenu(){ const sb=document.querySelector(".sidebar"); if(sb) sb.classList.remove("open"); const sc=document.getElementById("scrim"); if(sc) sc.classList.remove("show"); }
function showHome(){
  inHome=true; inLibrary=false; closeMenu();
  renderNav(document.getElementById("searchInput").value);
  const total=PRODUCTS.length, done=Object.values(passed).filter(Boolean).length;
  const pct=total?Math.round(done/total*100):0;
  const firstTodo=PRODUCTS.find(p=>!passed[p.id])||PRODUCTS[0];
  const name=currentUser?((currentUser.name||"").split(" ")[0]||currentUser.name):"";
  const cats=CAT_ORDER.filter(c=>c[0]!=="ONBOARDING").map(([c,label])=>{
    const its=PRODUCTS.filter(p=>p.eyebrow===c);
    const d=its.filter(p=>passed[p.id]).length;
    return {label,icon:its[0]?its[0].icon:"box",color:its[0]?its[0].color:"var(--blue-500)",total:its.length,done:d,cp:its.length?Math.round(d/its.length*100):0,first:its[0]?its[0].id:""};
  });
  document.getElementById("contentArea").innerHTML = `
    <div class="stack fade-in">
      <div class="dash-hero">
        <div class="hi">
          <div class="eyebrow">SITEM ACADEMY</div>
          <h2>สวัสดี, ${name} 👋</h2>
          <p>คุณเรียนจบแล้ว ${done} จาก ${total} หลักสูตร — มาเรียนต่อกันเลย</p>
          <button class="btn" onclick="selectProduct('${firstTodo.id}')">${svg("arrow")} เรียนต่อ: ${firstTodo.name}</button>
        </div>
        <svg class="ring2" viewBox="0 0 36 36">
          <path d="M18 2.1a15.9 15.9 0 110 31.8 15.9 15.9 0 010-31.8" fill="none" stroke="rgba(255,255,255,.2)" stroke-width="3"/>
          <path d="M18 2.1a15.9 15.9 0 110 31.8 15.9 15.9 0 010-31.8" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-dasharray="${pct},100"/>
          <text x="18" y="22" text-anchor="middle" font-size="9" font-weight="700" fill="#fff" font-family="var(--font-mono)">${pct}%</text>
        </svg>
      </div>
      <div class="stat-grid">
        <div class="stat"><div class="si" style="background:var(--green-500)">${svg("check")}</div><div><b>${done}</b><span>บทที่เรียนจบ</span></div></div>
        <div class="stat"><div class="si" style="background:var(--amber-500)">${svg("play")}</div><div><b>${total-done}</b><span>ยังไม่เรียน</span></div></div>
        <div class="stat"><div class="si" style="background:var(--cyan-500)">${svg("chart")}</div><div><b>${cats.length}</b><span>หมวดผลิตภัณฑ์</span></div></div>
        <div class="stat"><div class="si" style="background:var(--blue-500)">${svg("box")}</div><div><b>${total}</b><span>ผลิตภัณฑ์ทั้งหมด</span></div></div>
      </div>
      <div>
        <h3 class="section-title" style="margin-bottom:14px">หมวดผลิตภัณฑ์</h3>
        <div class="cat-grid">
          ${cats.map(c=>`<button class="cat-card" onclick="selectProduct('${c.first}')">
            <div class="ch"><div class="ci" style="background:${c.color}">${svg(c.icon)}</div><div><b>${c.label}</b><div class="cmeta">เรียนจบ ${c.done}/${c.total} บท</div></div></div>
            <div class="cat-bar"><i style="width:${c.cp}%"></i></div>
          </button>`).join("")}
        </div>
      </div>
    </div>`;
}

/* ============================================================ 7) เนื้อหาหลัก ============================================================ */
function renderContent(){
  const p = getProduct(currentId);
  const idx = PRODUCTS.findIndex(x=>x.id===currentId);
  const prev = PRODUCTS[idx-1], next = PRODUCTS[idx+1];
  const videoCard = hasVideo(p)
    ? `<div class="card">
        <h3 class="section-title">${svg("play")} วิดีโอ</h3>
        <div class="video-wrap"><iframe src="${videoEmbed(p)}" title="วิดีโอสอน ${p.name}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe></div>
        <div class="video-meta"><span class="pill">MODULE</span> หลักสูตร ${p.name} · ดูจบแล้วทำแบบทดสอบด้านล่าง</div>
      </div>`
    : `<div class="card">
        <h3 class="section-title">${svg("play")} วิดีโอ</h3>
        <div class="soon-box">วิดีโอบทนี้อยู่ระหว่างจัดทำ • เร็วๆ นี้</div>
      </div>`;
  const howto = p.howto.map((s,i)=>`<li><span class="num">${i+1}</span><span class="t">${s}</span></li>`).join("");
  const demoCard = p.demo ? `
      <div class="card">
        <h3 class="section-title">${svg("play")} สาธิตการใช้งาน (เครื่องจำลอง — กดเล่นได้)</h3>
        <div style="display:flex;justify-content:flex-end;margin-bottom:10px"><a class="btn btn-ghost" href="${p.demo}" target="_blank" rel="noopener" style="padding:7px 14px;font-size:13px">${svg("arrow")} เปิดเต็มจอ</a></div>
        <iframe class="demo-frame" src="${p.demo}" title="สาธิต ${p.name}"></iframe>
      </div>` : "";
  const docsCard = (p.docs && p.docs.length) ? `
      <div class="card">
        <h3 class="section-title">${svg("doc")} เอกสารประกอบการเรียน</h3>
        <div class="doc-list">
          ${p.docs.map(d=>`<a class="doc-item" href="${d.url}" target="_blank" rel="noopener"><span class="di-ic">${svg("doc")}</span><span>${d.title}</span><span class="di-go">${svg("arrow")}</span></a>`).join("")}
        </div>
      </div>` : "";
  const noQuiz = (p.quizLink === null || p.quizLink === undefined);
  const quizCard = `
      <div class="card">
        <div class="eyebrow">${noQuiz ? 'สรุปบทเรียน' : 'POST-TEST'}</div>
        <h3 class="section-title" style="margin-top:4px">${noQuiz ? 'จบบทเรียน' : 'แบบทดสอบท้ายบท'}</h3>
        <p style="margin-top:-8px;color:var(--text-muted);font-size:14px">${noQuiz ? 'บทนี้ไม่มีแบบทดสอบ — ดูวิดีโอจบแล้วกด “ทำเครื่องหมายว่าเรียนจบ” ได้เลย' : 'ทำแบบทดสอบท้ายบทเพื่อวัดความเข้าใจ เมื่อทำเสร็จแล้วกด “ทำเครื่องหมายว่าเรียนจบ” เพื่อบันทึกความคืบหน้า'}</p>
        <div class="quiz-actions">${noQuiz ? '' : quizBtn(p)}${doneBtn(p)}</div>
      </div>`;
  document.getElementById("contentArea").innerHTML = `
    <div class="stack fade-in">
      <div class="card">
        <div class="product-head">
          <div class="product-icon" style="background:${p.color}">${svg(p.icon)}</div>
          <div><div class="eyebrow">${p.eyebrow}</div><h2>${p.name}</h2><div class="tagline">${p.tagline}</div></div>
        </div>
        <p class="desc">${p.description}</p>
        <h3 class="section-title" style="margin-top:22px">วิธีการใช้งานเบื้องต้น</h3>
        <ul class="howto">${howto}</ul>
      </div>
      ${videoCard}
      ${docsCard}
      ${demoCard}
      ${quizCard}
      <div class="lesson-nav">
        ${prev?`<button class="btn btn-ghost" onclick="selectProduct('${prev.id}')">${svg("arrowleft")}<span>ก่อนหน้า: ${prev.name}</span></button>`:`<span></span>`}
        ${next?`<button class="btn btn-primary" onclick="selectProduct('${next.id}')"><span>ถัดไป: ${next.name}</span>${svg("arrow")}</button>`:`<span></span>`}
      </div>
    </div>`;
}

/* ============================================================ 8) แบบทดสอบ + ทำเครื่องหมายเรียนจบ ============================================================ */
function quizBtn(p){
  const has = p.quizLink && p.quizLink !== "#";
  return has
    ? `<a class="btn btn-primary" href="${p.quizLink}" target="_blank" rel="noopener">${svg("arrow")} ทำแบบทดสอบท้ายบท</a>`
    : `<span class="quiz-nolink">⚠ ยังไม่ได้ใส่ลิงก์ข้อสอบ (แก้ที่ช่อง quizLink)</span>`;
}
function doneBtn(p){
  return passed[p.id]
    ? `<button class="btn btn-done" onclick="toggleDone('${p.id}')">${svg("check")} เรียนจบบทนี้แล้ว (กดเพื่อยกเลิก)</button>`
    : `<button class="btn btn-ghost" onclick="toggleDone('${p.id}')">ทำเครื่องหมายว่าเรียนจบ</button>`;
}
function syncProgress(id){    // ส่งความคืบหน้าขึ้น Google Sheet ผ่าน Apps Script (ถ้าตั้งค่าไว้)
  if(!APPS_SCRIPT_URL || !currentUser) return;
  const p=getProduct(id);
  try{ fetch(APPS_SCRIPT_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain;charset=utf-8"},
    body:JSON.stringify({email:currentUser.email,name:currentUser.name,productId:id,product:p?p.name:id,done:!!passed[id]})}); }catch(e){}
}
function toggleDone(id){
  const willDone = !passed[id];
  const msg = willDone
    ? "ยืนยันว่าเรียนจบบทนี้แล้วใช่ไหม?"
    : "ยืนยันยกเลิกสถานะ \"เรียนจบ\" ของบทนี้?";
  if(!confirm(msg)) return;       // กดยกเลิก = ไม่บันทึกอะไร
  passed[id] = willDone;
  saveProgress();                 // บันทึกในเครื่อง
  syncProgress(id);               // ส่งขึ้นส่วนกลาง (ถ้ามี Apps Script)
  renderOverall();
  renderNav(document.getElementById("searchInput").value);
  renderContent();
}

/* ============================================================ 9) ระบบล็อกอิน ============================================================ */
const SITEM_DOMAIN = "@sitem.co.th";
const ADMIN_EMAILS = ["poowadolk@sitem.co.th"];   // อีเมลแอดมิน (เพิ่ม/ลดได้)
const isAdmin = email => ADMIN_EMAILS.map(x=>x.toLowerCase()).includes((email||"").toLowerCase());
const GOOGLE_CLIENT_ID = "153619259603-pc7cuamp045984cd1rfpgoefv3j7pnkc.apps.googleusercontent.com";
const GOOGLE_ONLY = true;   // true = เข้าได้เฉพาะ Google (ซ่อนช่องกรอกอีเมล)
// *** วาง URL ของ Apps Script Web App ที่นี่ เพื่อเก็บความคืบหน้ารวมศูนย์ (ดูคู่มือ) ว่างไว้ = เก็บเฉพาะในเครื่อง ***
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxb28ROsVGon-io4s6O1bEKBDnnTuRtAQf8y1o3SxPcppjHrrHLLTWQnRvsOPStBxna/exec";

let currentUser = null;
function initialsOf(name){
  const parts = name.trim().split(/\s+/);
  return ((parts[0]?.[0]||"") + (parts[1]?.[0]||"")).toUpperCase() || "U";
}
function showApp(user){
  currentUser = user;
  document.getElementById("userName").textContent  = user.name;
  document.getElementById("userEmail").textContent = user.email;
  const av = document.getElementById("userAvatar");
  av.innerHTML = user.picture ? `<img src="${user.picture}" alt="">` : initialsOf(user.name);
  document.getElementById("adminBtn").style.display = isAdmin(user.email) ? "inline-block" : "none";
  document.getElementById("loginScreen").classList.add("hidden");
  document.getElementById("appLayout").classList.add("show");
  loadProgress();                 // โหลดความคืบหน้าของผู้ใช้คนนี้
  renderOverall(); showHome();
}
function logout(){
  localStorage.removeItem("sitem_user");
  currentUser = null;
  document.getElementById("appLayout").classList.remove("show");
  document.getElementById("loginScreen").classList.remove("hidden");
  document.getElementById("loginForm").reset();
}

document.getElementById("loginForm").addEventListener("submit",e=>{
  e.preventDefault();
  const name  = document.getElementById("loginName").value.trim();
  const email = document.getElementById("loginEmail").value.trim().toLowerCase();
  const err   = document.getElementById("loginErr");
  if(!email.endsWith(SITEM_DOMAIN)){
    err.textContent = "กรุณาใช้อีเมลบริษัทที่ลงท้ายด้วย " + SITEM_DOMAIN;
    return;
  }
  err.textContent = "";
  const user = { name, email, verified:false };
  localStorage.setItem("sitem_user", JSON.stringify(user));
  showApp(user);
});
document.getElementById("logoutBtn").addEventListener("click", logout);
if(GOOGLE_ONLY){ document.getElementById("loginForm").style.display="none"; document.getElementById("loginOr").style.display="none"; }
document.getElementById("hambBtn").addEventListener("click",()=>{const sb=document.querySelector(".sidebar");const open=!sb.classList.contains("open");sb.classList.toggle("open",open);document.getElementById("scrim").classList.toggle("show",open);});
document.getElementById("scrim").addEventListener("click",closeMenu);

function decodeJwt(t){
  try{ return JSON.parse(decodeURIComponent(atob(t.split(".")[1].replace(/-/g,"+").replace(/_/g,"/")).split("").map(c=>"%"+("00"+c.charCodeAt(0).toString(16)).slice(-2)).join(""))); }
  catch(e){ return {}; }
}
function handleGoogleCredential(resp){
  const info = decodeJwt(resp.credential);
  const email = (info.email||"").toLowerCase();
  if(!email.endsWith(SITEM_DOMAIN)){
    document.getElementById("loginErr").textContent = "ต้องเข้าด้วยบัญชี " + SITEM_DOMAIN + " เท่านั้น";
    return;
  }
  const user = { name: info.name || email, email, picture: info.picture || "", verified:true };
  localStorage.setItem("sitem_user", JSON.stringify(user));
  showApp(user);
}
function initGoogle(){
  if(!GOOGLE_CLIENT_ID || !(window.google && google.accounts)) return;
  google.accounts.id.initialize({ client_id: GOOGLE_CLIENT_ID, callback: handleGoogleCredential, hd:"sitem.co.th" });
  google.accounts.id.renderButton(document.getElementById("gsiBtn"), { theme:"outline", size:"large", width:320, text:"signin_with", shape:"pill" });
  document.getElementById("gsiWrap").style.display = "flex";
  document.getElementById("loginOr").style.display = GOOGLE_ONLY ? "none" : "flex";
}
window.onGoogleLibraryLoad = initGoogle;
if(window.google && google.accounts) initGoogle();

/* ============================================================ 10) EVENTS + INIT ============================================================ */
document.getElementById("searchInput").addEventListener("input",e=>renderNav(e.target.value));
renderNav(); renderOverall(); showHome();
const _saved = localStorage.getItem("sitem_user");
if(_saved){ try{ showApp(JSON.parse(_saved)); }catch(e){} }
</script>
